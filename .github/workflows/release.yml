name: Build and publish iMerge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: imerge-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Restore release signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.IMERGE_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/imerge-release.jks"

      - name: Define release version
        run: |
          # Include the run attempt so re-running a workflow yields a fresh, monotonic version.
          echo "IMERGE_VERSION_CODE=$((100000 + GITHUB_RUN_NUMBER * 10 + GITHUB_RUN_ATTEMPT))" >> "$GITHUB_ENV"
          VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          if [ "${GITHUB_RUN_ATTEMPT}" -gt 1 ]; then
            VERSION_NAME="${VERSION_NAME}.${GITHUB_RUN_ATTEMPT}"
          fi
          echo "IMERGE_VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "IMERGE_KEYSTORE_PATH=$RUNNER_TEMP/imerge-release.jks" >> "$GITHUB_ENV"
          echo "IMERGE_KEY_ALIAS=imerge" >> "$GITHUB_ENV"

      - name: Test and build signed APK
        env:
          IMERGE_KEYSTORE_PASSWORD: ${{ secrets.IMERGE_KEYSTORE_PASSWORD }}
          IMERGE_KEY_PASSWORD: ${{ secrets.IMERGE_KEY_PASSWORD }}
        run: ./gradlew testDebugUnitTest lintDebug assembleRelease

      - name: Prepare update manifest
        env:
          APK_URL: https://github.com/ha6old/iMerge/releases/latest/download/iMerge.apk
          CHANGELOG: ${{ github.event.head_commit.message || 'Manual iMerge release' }}
        run: |
          cp app/build/outputs/apk/release/app-release.apk iMerge.apk
          APK_SHA256=$(sha256sum iMerge.apk | cut -d ' ' -f 1)
          jq -n \
            --argjson versionCode "$IMERGE_VERSION_CODE" \
            --arg versionName "$IMERGE_VERSION_NAME" \
            --arg apkUrl "$APK_URL" \
            --arg sha256 "$APK_SHA256" \
            --arg changelog "$CHANGELOG" \
            '{versionCode: $versionCode, versionName: $versionName, minSdk: 29, apkUrl: $apkUrl, sha256: $sha256, changelog: $changelog}' \
            > update.json

      - name: Verify APK signature
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/apksigner"
          "$APKSIGNER" verify --verbose iMerge.apk

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGELOG: ${{ github.event.head_commit.message || 'Manual iMerge release' }}
        run: |
          gh release create "v$IMERGE_VERSION_NAME" iMerge.apk update.json \
            --title "iMerge $IMERGE_VERSION_NAME" \
            --notes "$CHANGELOG" \
            --latest
